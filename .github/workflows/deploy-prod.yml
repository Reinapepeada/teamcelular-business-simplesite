name: Deploy Next.js to Prod EC2

on:
  push:
    branches:
      - main

  workflow_run:
    workflows: ['deploy-dev']
    types:
      - completed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Use Node.js 20.11.1
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate .env.production
        run: |
          rm -rf .env.production
          cat <<EOF > .env.production
          NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}
          EOF

      - name: Build Next.js project
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: npm run build

      - name: Verificar archivos antes del SCP
        run: |
          echo "Verificando archivos antes del deploy:"
          [ -d ".next" ] && echo "✅ .next OK" || (echo "❌ FALTA .next/" && exit 1)
          [ -d "public" ] && echo "✅ public OK" || (echo "❌ FALTA public/" && exit 1)
          [ -f "package.json" ] && echo "✅ package.json OK" || (echo "❌ FALTA package.json" && exit 1)
          [ -f ".env.production" ] && echo "✅ .env.production OK" || (echo "❌ FALTA .env.production" && exit 1)
          pwd && ls -la .next/ public/ package.json .env.production
          echo "Archivos verificados correctamente."

      - name: Deploy via rsync over SSH
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          rsync -avz --no-times --no-perms \
            -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            .next public package.json .env.production \
            $EC2_USER@$EC2_HOST:/opt/next-app/
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Restart frontend.service on EC2 (prod)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/next-app
            npm ci --omit=dev
            sudo systemctl restart frontend.service
            sudo systemctl status frontend.service --no-pager
